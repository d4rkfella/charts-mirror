---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Chart Builder

on:
  workflow_call:
    inputs:
      name:
        type: string
        description: Chart Name
        required: true
      version:
        type: string
        description: Chart Version
        required: true
      registry:
        type: string
        description: Chart Registry
        required: true
      release:
        type: boolean
        description: Release
        required: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      chart-exists: ${{ steps.chart.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Repository Name
        id: repository
        run: |
          echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Check For Exising Chart
        uses: ./.github/actions/chart-exists
        id: chart
        with:
          chart: ${{ steps.repository.outputs.name }}/${{ inputs.name }}

  build:
    name: Build (${{ inputs.version }})
    runs-on: ubuntu-latest
    needs: ["prepare"]
    steps:
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - if: ${{ inputs.release }}
        name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.0.5

      - if: ${{ inputs.release }}
        name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Add Helm Repository
        run: |
          helm repo add upstream ${{ inputs.registry }}

      - name: Update Helm Repository
        run: |
          helm repo update upstream

      - name: Pull Chart
        run: |
          helm pull upstream/${{ inputs.name }} --version ${{ inputs.version }} --untar

      - name: Sanitize Chart Version Labels
        run: |
          #!/bin/bash
          set -euo pipefail
          
          CHART_DIR="${{ inputs.name }}"
          
          if [ ! -d "$CHART_DIR/templates" ]; then
            echo "⏭️  No templates directory found in $CHART_DIR, skipping sanitization"
            exit 0
          fi
          
          echo "🔧 Sanitizing version labels in $CHART_DIR/templates..."
          
          FILES_MODIFIED=0
          
          while IFS= read -r -d '' file; do
            if grep -q '\.Chart\.Version' "$file"; then
              echo "  Processing: $file"
              
              cp "$file" "$file.bak"
              
              sed -i -E 's/\{\{-?[[:space:]]*\.Chart\.Version[[:space:]]*-?\}\}/{{ .Chart.Version | splitList "+" | first | trunc 63 }}/g' "$file"
              
              if ! cmp -s "$file" "$file.bak"; then
                FILES_MODIFIED=$((FILES_MODIFIED + 1))
                echo "    ✅ Modified"
              else
                echo "    ⏭️  No changes needed"
              fi
              
              rm "$file.bak"
            fi
          done < <(find "$CHART_DIR/templates" -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.tpl" \) -print0)
          
          if [ "$FILES_MODIFIED" -gt 0 ]; then
            echo "✅ Sanitized $FILES_MODIFIED file(s)"
          else
            echo "ℹ️  No .Chart.Version references found or no changes needed"
          fi

      - name: Package Chart
        run: |
          helm package ${{ inputs.name }}

      - if: ${{ inputs.release }}
        name: Push Chart
        id: push
        run: |
          OUTPUT=$(helm push *.tgz oci://ghcr.io/${{ github.repository }} 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | sed -n 's/Digest: //p')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - if: ${{ inputs.release }}
        name: Sign artifacts with Cosign
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/${{ inputs.name }}@${{ steps.push.outputs.digest }}

  release:
    if: ${{ inputs.release && needs.prepare.outputs.chart-exists != 'true' }}
    name: Release
    needs: ["prepare", "build"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Repository Name
        id: repository
        run: |
          echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Generate Token
        uses: actions/create-github-app-token@7bd03711494f032dfa3be3558f7dc8787b0be333 # v3.1.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Get Release Tag
        uses: ./.github/actions/release-tag
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Create Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          body: |
            > [!NOTE]
            > A new chart has been added.

            ## 📦 Chart

            **Name**: [${{ inputs.name }}](https://github.com/${{ github.repository }}/pkgs/container/${{ steps.repository.outputs.name }}%2F${{ inputs.name }})
          tag: ${{ steps.release.outputs.tag }}
          token: ${{ steps.app-token.outputs.token }}
